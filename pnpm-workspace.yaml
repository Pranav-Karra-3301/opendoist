packages:
  - apps/*
  - packages/*

# `pnpm deploy` (Dockerfile: `pnpm --filter @opentask/server --prod deploy /out/server`)
# hard-fails on pnpm >=10 with ERR_PNPM_DEPLOY_NONINJECTED_WORKSPACE unless the workspace
# either injects workspace packages everywhere or opts into the legacy copy-based deploy.
# Legacy deploy is the minimal choice: it only changes `pnpm deploy`, not dev installs.
forceLegacyDeploy: true

allowBuilds:
  better-sqlite3: true
  esbuild: true
  # sharp's install script only verifies/loads its prebuilt @img/* libvips binaries
  sharp: true

catalog:
  cuelume: ^0.1.2
  typescript: ^5.9.0
  vitest: ^4.1.10
  '@biomejs/biome': ^2.5.4
