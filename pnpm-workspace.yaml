  rrule-temporal: ^2.0.0
  nanoid: ^5.1.0
  fast-check: ^4.3.0
  react: ^19.2.0
  react-dom: ^19.2.0
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@types/node': ^22.15.0
