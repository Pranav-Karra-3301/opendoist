name: Docker

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Publish versioned tags (X.Y.Z, no v prefix); empty = nightly'
        required: false
        default: ''

env:
  IMAGE: ghcr.io/pranav-karra-3301/opentask

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with: { context: ., load: true, push: false, tags: 'opentask:smoke' }
      - run: bash scripts/smoke-docker.sh opentask:smoke

  build:
    needs: [smoke]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: version
        name: Compute version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            V="${{ github.event.release.tag_name }}"
            V="${V#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="nightly"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.version }}-${{ matrix.arch }}
          build-args: OPENTASK_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=${{ env.IMAGE }}-build-cache:${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.IMAGE }}-build-cache:${{ matrix.arch }},mode=max

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: version
        name: Compute version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            V="${{ github.event.release.tag_name }}"
            V="${V#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="nightly"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Create multi-arch manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAGS="-t $IMAGE:$VERSION"
          if [ "$VERSION" != "nightly" ]; then
            TAGS="$TAGS -t $IMAGE:latest -t $IMAGE:${VERSION%.*}"
          fi
          docker buildx imagetools create $TAGS \
            "$IMAGE:$VERSION-amd64" \
            "$IMAGE:$VERSION-arm64"
