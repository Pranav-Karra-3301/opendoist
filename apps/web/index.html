<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenDoist</title>
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#fcfcf8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="OpenDoist" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      // Pre-hydration theme paint. Resolves the account-settings theme mirrored to localStorage
      // by lib/theme.ts (`od-theme` = base theme, `od-auto-dark` = 'true'|'false'): Auto Dark maps
      // to Dark only under a dark OS. `kale` is the :root default, so it clears `data-theme`.
      // Back-compat: the phase-4 quick-toggle wrote `od-theme` = 'system' to mean "follow the OS
      // from Kale"; treat that (and an unset value) as Kale + Auto Dark.
      ;(() => {
        var root = document.documentElement
        var theme = localStorage.getItem('od-theme')
        var autoDark = localStorage.getItem('od-auto-dark') === 'true'
        if (theme === null || theme === 'system') {
          theme = 'kale'
          autoDark = true
        }
        var osDark = matchMedia('(prefers-color-scheme: dark)').matches
        var resolved = autoDark && osDark ? 'dark' : theme
        root.classList.remove('system-dark')
        if (resolved === 'kale') root.removeAttribute('data-theme')
        else root.setAttribute('data-theme', resolved)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
