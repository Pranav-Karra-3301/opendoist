<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenDoist</title>
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#fcfcf8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="OpenDoist" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      // Pre-hydration theme paint (appearance × accent). Reads the two axes mirrored to
      // localStorage by lib/theme.ts: `od-appearance` = 'light'|'dark'|'system', `od-accent` =
      // the palette name. `data-accent` applies the accent in both light and dark; `data-mode`
      // ('light'|'dark') or `.system-dark` (system → follows the OS) applies the appearance.
      // Back-compat: a pre-appearance install still has `od-theme`/`od-auto-dark` (and an old
      // 'system' meant "follow the OS from Kale") — migrate those to appearance/accent inline.
      ;(() => {
        var root = document.documentElement
        var ACCENTS = ['kale', 'todoist', 'moonstone', 'tangerine', 'blueberry', 'lavender', 'raspberry']
        var appearance = localStorage.getItem('od-appearance')
        var accent = localStorage.getItem('od-accent')
        var theme, autoDark, baseAccent
        if (!appearance || !accent) {
          theme = localStorage.getItem('od-theme')
          autoDark = localStorage.getItem('od-auto-dark') === 'true'
          if (theme === null || theme === 'system') {
            theme = 'kale'
            autoDark = true
          }
          baseAccent = theme === 'dark' ? 'kale' : theme
          if (autoDark) {
            appearance = appearance || 'system'
            accent = accent || baseAccent
          } else if (theme === 'dark') {
            appearance = appearance || 'dark'
            accent = accent || 'kale'
          } else {
            appearance = appearance || 'light'
            accent = accent || theme
          }
        }
        if (ACCENTS.indexOf(accent) === -1) accent = 'kale'
        if (appearance !== 'light' && appearance !== 'dark') appearance = 'system'
        root.setAttribute('data-accent', accent)
        root.classList.remove('system-dark')
        if (appearance === 'dark') root.setAttribute('data-mode', 'dark')
        else if (appearance === 'light') root.setAttribute('data-mode', 'light')
        else {
          root.removeAttribute('data-mode')
          if (matchMedia('(prefers-color-scheme: dark)').matches) root.classList.add('system-dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
